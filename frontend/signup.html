<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SAMKWANG AI 회원가입</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f7f8;
      --panel: #ffffff;
      --border: #e5e5e5;
      --text: #0d0d0d;
      --muted: #6e6e80;
      --primary: #0d0d0d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", "Noto Sans KR", -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
    }
    h1 { font-size: 22px; margin-bottom: 8px; }
    .sub { color: var(--muted); margin-bottom: 20px; font-size: 14px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      margin-top: 12px;
    }
    input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 12px;
      font: inherit;
      font-size: 14px;
      outline: none;
      background: #fff;
    }
    input:focus { border-color: #222; }
    .row {
      display: flex;
      gap: 8px;
      margin-top: 18px;
    }
    button {
      flex: 1;
      height: 42px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
      font: inherit;
      font-size: 14px;
      font-weight: 600;
    }
    .primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .msg {
      margin-top: 14px;
      font-size: 13px;
      white-space: pre-wrap;
      color: var(--muted);
      min-height: 18px;
    }
    .ok { color: #0f8a5f; }
    .err { color: #b42318; }
    .back {
      margin-top: 16px;
      display: inline-block;
      font-size: 13px;
      color: #333;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>회원가입</h1>
    <p class="sub">이메일 아이디로 계정을 생성합니다.</p>

    <label for="email">이메일 (아이디)</label>
    <input id="email" type="email" inputmode="email" autocomplete="email" placeholder="name@company.com" />

    <label for="password">비밀번호</label>
    <input id="password" type="password" autocomplete="new-password" />

    <label for="passwordConfirm">비밀번호 확인</label>
    <input id="passwordConfirm" type="password" autocomplete="new-password" />

    <div class="row">
      <button class="primary" id="btnSignup" type="button">회원가입</button>
      <button id="btnLoginPage" type="button">로그인 화면</button>
    </div>

    <p id="msg" class="msg"></p>
    <a class="back" href="/">채팅으로 돌아가기</a>
  </div>

  <script>
    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");
    const passwordConfirmEl = document.getElementById("passwordConfirm");
    const btnSignup = document.getElementById("btnSignup");
    const btnLoginPage = document.getElementById("btnLoginPage");
    const msg = document.getElementById("msg");

    function setMsg(text, ok) {
      msg.textContent = text;
      msg.className = "msg " + (ok ? "ok" : "err");
    }

    function isValidEmail(s) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s);
    }

    async function postJson(url, body) {
      const r = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok) {
        throw new Error((data && data.detail) ? String(data.detail) : "요청 실패 (" + r.status + ")");
      }
      return data;
    }

    function getPayload() {
      const email = (emailEl.value || "").trim();
      const password = (passwordEl.value || "").trim();
      const passwordConfirm = (passwordConfirmEl.value || "").trim();
      if (!email || !password || !passwordConfirm) {
        throw new Error("이메일, 비밀번호, 비밀번호 확인을 입력해 주세요.");
      }
      if (!isValidEmail(email)) {
        throw new Error("올바른 이메일 형식으로 입력해 주세요.");
      }
      if (password.length < 6) {
        throw new Error("비밀번호는 6자 이상이어야 합니다.");
      }
      if (password !== passwordConfirm) {
        throw new Error("비밀번호가 일치하지 않습니다.");
      }
      return { email, password, password_confirm: passwordConfirm };
    }

    btnSignup.addEventListener("click", async () => {
      try {
        const payload = getPayload();
        const data = await postJson("/api/auth/signup", payload);
        localStorage.setItem("samkwang_access_token", data.access_token);
        localStorage.setItem("samkwang_username", data.username);
        setMsg("회원가입 성공. 채팅 화면으로 이동합니다.", true);
        setTimeout(() => { window.location.href = "/"; }, 400);
      } catch (e) {
        setMsg(String(e.message || e), false);
      }
    });

    btnLoginPage.addEventListener("click", () => {
      window.location.href = "/login.html";
    });

    [emailEl, passwordEl, passwordConfirmEl].forEach((el) => {
      el.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          btnSignup.click();
        }
      });
    });
  </script>
</body>
</html>
